services:

  db_mongo:
    build:
      context: ./mongo
      dockerfile: Dockerfile
    container_name: db_mongo
    restart: on-failure
    environment:
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"quit(db.getSiblingDB('blog_db').posts.countDocuments() === 5 ? 0 : 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db_mysql:
    image: mysql:8.0
    container_name: db_mysql
    restart: on-failure
    environment:
      - MYSQL_ROOT_PASSWORD
      - MYSQL_DATABASE
      - MYSQL_USER
      - MYSQL_PASSWORD
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysql -u$$MYSQL_USER -p$$MYSQL_PASSWORD $$MYSQL_DATABASE --skip-column-names -e 'SELECT COUNT(*) FROM utilisateurs HAVING COUNT(*) = 4' | grep -q 4"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  admin_mongo:
    image: mongo-express:1.0.2
    container_name: admin_mongo
    restart: on-failure
    environment:
      ME_CONFIG_MONGODB_URL:        ${MONGO_URL}
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGOEXPRESS_LOGIN}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGOEXPRESS_PASSWORD}
    ports:
      - "8081:8081"
    depends_on:
      db_mongo:
        condition: service_healthy

  admin_mysql:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    depends_on:
      db_mysql:
        condition: service_healthy

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api
    restart: on-failure
    environment:
      - MONGO_URL
      - MONGO_DB=${MONGO_INITDB_DATABASE}
      - MYSQL_HOST=db_mysql
      - MYSQL_PORT
      - MYSQL_USER
      - MYSQL_PASSWORD
      - MYSQL_DATABASE
    command: uvicorn main:app --proxy-headers --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      db_mongo:
        condition: service_healthy
      db_mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/posts > /dev/null && curl -sf http://localhost:8000/users > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  mongo_data:
  mysql_data:
