name: Build and Test Application

on: 
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
    
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v4
     - name: Set up Docker Buildx
       uses: docker/setup-buildx-action@v3
     - name: Build image for scanning Python
       run: docker build -t my-app-python:1.0.0 -f ./api/Dockerfile .
     - name: Build image for scanning Mongo 
       run: docker build -t my-app-mongo:1.0.0 -f ./mongo/Dockerfile ./mongo
     - name: Login to Docker Hub
       uses: docker/login-action@v4
       with:
         username: ${{secrets.DOCKERHUB_USERNAME}}
         password: ${{secrets.DOCKERHUB_TOKEN}}
     - name: Docker Scout Scan Python
       uses: docker/scout-action@v1
       with:
         command: recommendations
         image: my-app-python:1.0.0
         file: ./api/Dockerfile
         only-severities: criticals,high
         exit-code: false
     - name: Docker Scout Scan Mongo
       uses: docker/scout-action@v1
       with:
         command: recommendations
         image: my-app-mongo:1.0.0
         file: ./mongo/Dockerfile
         only-severities: criticals,high
         exit-code: false
  docker-compose:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Checkout code
        run: docker compose up -d   
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER: ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
          MONGO_INITDB_DATABASE: ${{ secrets.MONGO_INITDB_DATABASE }}
          MONGO_URL: ${{ secrets.MONGO_URL }}
          MONGOEXPRESS_LOGIN: ${{ secrets.MONGOEXPRESS_LOGIN }}
          MONGOEXPRESS_PASSWORD: ${{ secrets.MONGOEXPRESS_PASSWORD }}
