name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API image
        run: docker build -t my-app-python:1.0.0 -f ./api/Dockerfile ./api

      - name: Docker Scout scan API (fail on critical)
        uses: docker/scout-action@v1
        with:
          command: cves
          image: my-app-python:1.0.0
          only-severities: critical
          exit-code: true

      - name: Trivy scan MySQL (report only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mysql:8.0
          severity: CRITICAL,HIGH
          exit-code: '0'

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate .env file
        run: |
          cat <<EOF > .env
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_PORT=${{ secrets.MYSQL_PORT }}
          MONGO_INITDB_DATABASE=${{ secrets.MONGO_INITDB_DATABASE }}
          MONGO_URL=${{ secrets.MONGO_URL }}
          MONGOEXPRESS_LOGIN=${{ secrets.MONGOEXPRESS_LOGIN }}
          MONGOEXPRESS_PASSWORD=${{ secrets.MONGOEXPRESS_PASSWORD }}
          EOF

      - name: Deploy stack
        run: docker compose up -d

      - name: Wait for all services healthy
        run: |
          MAX=12
          DELAY=5
          for i in $(seq 1 $MAX); do
            echo "Attempt $i/$MAX..."
            STATUSES=$(docker compose ps --format json | jq -r '.[].Health')
            echo "Statuses: $STATUSES"
            UNHEALTHY=$(echo "$STATUSES" | grep -v "^healthy$" | grep -v "^$" || true)
            ALL_COUNT=$(echo "$STATUSES" | grep -c "." || true)
            HEALTHY_COUNT=$(echo "$STATUSES" | grep -c "^healthy$" || true)
            if [ "$ALL_COUNT" -gt 0 ] && [ "$ALL_COUNT" -eq "$HEALTHY_COUNT" ]; then
              echo "All services healthy."
              exit 0
            fi
            sleep $DELAY
          done
          echo "Timeout: services not healthy after $((MAX * DELAY))s."
          docker compose ps
          docker compose logs
          exit 1

      - name: Validate /posts endpoint
        run: curl -sf http://localhost:8000/posts

      - name: Validate /users endpoint
        run: curl -sf http://localhost:8000/users

  publish:
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-app-python:latest
